[pytest]
# Pytest configuration for RAG Llama Index project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Asyncio configuration
asyncio_mode = auto

# Markers (custom test categories)
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require database, APIs)
    slow: Slow running tests
    skip_in_ci: Skip in CI/CD pipeline

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov)
# Run with: pytest --cov=. --cov-report=html
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */.venv/*
    */migrations/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
